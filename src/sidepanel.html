<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GetDocumented</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <header>
      <h1>GetDocumented</h1>
      <p>Click through any page to build your visual documentation flow.</p>
    </header>

    <section id="authPanel" class="auth-panel">
      <div id="authLoggedOut">
        <h2>Extension Login</h2>
        <p class="auth-copy">Log in from the web app to enable capture and save documents to the shared workspace.</p>
        <button id="openLoginButton" type="button" class="primary auth-launch-button">Log in</button>
      </div>
      <div id="authLoggedIn" hidden>
        <p class="auth-copy">Authenticated as <strong id="authUserEmail"></strong></p>
        <button id="logoutButton" type="button">Log out</button>
      </div>
      <p id="authStatus" class="status" aria-live="polite"></p>
    </section>

    <section class="controls">
      <button id="restartCapture" class="primary">Restart Capture</button>
      <button id="exportPdf" class="primary">Export</button>
      <button id="saveSession">Save</button>
      <button id="clearSession">Clear</button>
    </section>

    <section id="departmentPicker" class="department-picker" hidden>
      <label for="saveDepartment">
        Save To Group
      </label>
      <select id="saveDepartment"></select>
    </section>

    <section class="document-fields">
      <label for="saveVisibility">
        Visibility
      </label>
      <select id="saveVisibility">
        <option value="public">Public</option>
        <option value="private">Private</option>
      </select>
    </section>

    <section class="document-fields">
      <label for="documentTitle">
        Document Title
      </label>
      <input id="documentTitle" type="text" placeholder="Leave blank to use the generated title" />
    </section>

    <p id="saveStatus" class="status" aria-live="polite"></p>

    <section id="steps" class="steps"></section>
    <template id="stepTemplate">
      <article class="step">
        <h2></h2>
        <p class="meta"></p>
        <p class="selector"></p>
        <img alt="Captured click screenshot" />
      </article>
    </template>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
