<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracely</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <section id="authLoggedOut" class="logged-out-screen">
      <img src="../icons/icon128.png" alt="Tracely" class="login-logo" />
      <h1 class="login-brand-name">Tracely</h1>
      <button id="openLoginButton" type="button" class="login-centered-button">Login</button>
      <p id="authStatus" class="status auth-status-centered" aria-live="polite"></p>
    </section>

    <main id="appShell" class="app-shell" hidden>
      <header class="topbar">
        <div class="brand-mark"><img src="../icons/icon128.png" alt="Tracely" class="login-logo" /></div>
        <div id="groupSelectorWrap" class="group-selector-wrap" hidden>
          <select id="groupSelector" class="group-selector" aria-label="Select group">
            <option value="">All groups</option>
          </select>
        </div>
        <div class="topbar-actions">
          <div class="user-chip">
            <span class="user-chip-badge" id="authUserInitials">U</span>
            <strong id="authUserName"></strong>
          </div>
        </div>
      </header>

      <section id="launcherView" class="launcher-view">
        <section class="hero-card">
          <button id="restartCapture" class="capture-button">Start Capture</button>
        </section>

        <section class="search-card">
          <input id="documentSearch" type="search" placeholder="Search documents" aria-label="Search documents you can access" />
        </section>

        <section class="documents-section">
          <h2>Documents you can access</h2>
          <section id="documentsList" class="documents-list"></section>
        </section>
      </section>

      <p id="saveStatus" class="status" aria-live="polite"></p>

      <section id="captureView" class="capture-view" hidden>
        <section class="steps-section">
          <h2>Captured steps</h2>
          <section id="steps" class="steps"></section>
        </section>

        <div class="thread-actions">
          <button id="saveSession" type="button" class="floating-action floating-action-save" aria-label="Save thread" title="Save thread">
            <svg viewBox="0 0 512 512" aria-hidden="true">
              <path d="M173.9 439.4L7.5 273c-10-10-10-26.2 0-36.2l36.2-36.2c10-10 26.2-10 36.2 0L192 312.7 432.1 72.6c10-10 26.2-10 36.2 0l36.2 36.2c10 10 10 26.2 0 36.2L210.1 439.4c-10 10-26.2 10-36.2 0z"/>
            </svg>
          </button>
          <button id="clearSession" type="button" class="floating-action floating-action-delete" aria-label="Delete thread" title="Delete thread">
            <svg viewBox="0 0 448 512" aria-hidden="true">
              <path d="M135.2 17.7C140.7 7.1 151.7 0 163.8 0h120.4c12.1 0 23.1 7.1 28.6 17.7L328 32H432c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16h-16l-21.2 339.3c-1.6 25.7-22.9 45.7-48.7 45.7H102c-25.8 0-47.1-20-48.7-45.7L32 96H16C7.2 96 0 88.8 0 80V48c0-8.8 7.2-16 16-16h104l15.2-14.3zM177.3 416c8.8 0 16-7.2 16-16V176c0-8.8-7.2-16-16-16h-16c-8.8 0-16 7.2-16 16v224c0 8.8 7.2 16 16 16h16zm112 0c8.8 0 16-7.2 16-16V176c0-8.8-7.2-16-16-16h-16c-8.8 0-16 7.2-16 16v224c0 8.8 7.2 16 16 16h16z"/>
            </svg>
          </button>
        </div>
      </section>
    </main>
    <template id="stepTemplate">
      <article class="step">
        <img alt="Captured click screenshot" />
        <div class="step-copy">
          <h2></h2>
          <p class="meta"></p>
          <p class="selector"></p>
        </div>
        <button type="button" class="step-delete-button" aria-label="Delete step" title="Delete step">
          <svg viewBox="0 0 448 512" aria-hidden="true">
            <path d="M135.2 17.7C140.7 7.1 151.7 0 163.8 0h120.4c12.1 0 23.1 7.1 28.6 17.7L328 32H432c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16h-16l-21.2 339.3c-1.6 25.7-22.9 45.7-48.7 45.7H102c-25.8 0-47.1-20-48.7-45.7L32 96H16C7.2 96 0 88.8 0 80V48c0-8.8 7.2-16 16-16h104l15.2-14.3z"/>
          </svg>
        </button>
      </article>
    </template>
    <template id="documentTemplate">
      <article class="document-row">
        <div class="document-copy">
          <h3></h3>
          <p class="document-meta"></p>
          <p class="document-date"></p>
        </div>
        <span class="document-status"></span>
      </article>
    </template>
    <div id="saveOverlay" class="save-overlay" hidden aria-live="polite" aria-label="Saving">
      <div class="save-overlay-card">
        <div class="save-overlay-spinner"></div>
        <span>Saving…</span>
      </div>
    </div>
    <script src="./config.js"></script>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
